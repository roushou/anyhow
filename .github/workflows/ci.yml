name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: build
        run: bun run build

      - name: format
        run: bun run format:check

      - name: lint
        run: bun run lint

      - name: typecheck
        run: bun run typecheck

      - name: test
        run: bun test
